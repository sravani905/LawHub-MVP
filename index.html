<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LawHub MVP - Legal Literacy Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1a1a2e;
      --secondary: #d4af37;
      --accent: #b19cd9;
      --text: #ffffff;
      --bg: #0f0f1e
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, var(--primary) 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    #root { width: 100%; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    header {
      padding: 2rem 0;
      border-bottom: 2px solid var(--secondary);
      background: rgba(0, 0, 0, 0.3);
    }
    .logo { font-size: 1.8rem; font-weight: bold; color: var(--secondary); margin-bottom: 0.5rem; }
    .tagline { color: var(--accent); font-size: 0.9rem; }
    section { padding: 3rem 0; }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; color: var(--secondary); }
    h2 { font-size: 2rem; margin-bottom: 2rem; color: var(--secondary); text-align: center; }
    h3 { color: var(--secondary); margin: 1rem 0 0.5rem 0; }
    .btn {
      display: inline-block;
      background: var(--secondary);
      color: var(--bg);
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin: 0.5rem;
      transition: all 0.3s;
      font-size: 1rem;
    }
    .btn:hover {
      background: var(--accent);
      color: var(--text);
      transform: translateY(-2px);
    }
    .btn-secondary { background: var(--accent); }
    .btn-secondary:hover { background: var(--secondary); }
    .select-wrapper { margin: 2rem 0; }
    .select-wrapper select {
      padding: 0.8rem 1rem;
      border: 2px solid var(--secondary);
      background: rgba(0, 0, 0, 0.5);
      color: var(--text);
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      max-width: 300px;
    }
    .input-group {
      display: flex;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }
    .input-group input {
      flex: 1;
      min-width: 250px;
      padding: 0.8rem 1rem;
      border: 2px solid var(--secondary);
      background: rgba(0, 0, 0, 0.5);
      color: var(--text);
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Translation data
    const translations = {
      en: {
        logo: '⚖️ LawHub MVP',
        tagline: 'Legal Literacy Platform for India',
        selectLanguage: 'Select Your Language',
        youSelected: 'You selected:',
        next: 'Next',
        savedCases: 'Saved Cases',
        language: 'Language',
        question: 'Question',
        saved: 'Saved',
        delete: 'Delete',
        rentNotice: 'Rent Notice'
      },
      hi: {
        logo: '⚖️ LawHub MVP',
        tagline: 'भारत के लिए कानूनी साक्षरता मंच',
        selectLanguage: 'अपनी भाषा चुनें',
        youSelected: 'आपने चुना:',
        next: 'अगला',
        savedCases: 'सहेजे गए मामले',
        language: 'भाषा',
        question: 'प्रश्न',
        saved: 'सहेजा गया',
        delete: 'हटाएं',
        rentNotice: 'किराया नोटिस'
      },
      ta: {
        logo: '⚖️ LawHub MVP',
        tagline: 'இந்தியாவுக்கான சட்ட சாक்ষரதை தளம்',
        selectLanguage: 'உங்கள் மொழியைத் தேர்ந்தெடுக்கவும்',
        youSelected: 'நீங்கள் தேர்ந்தெடுத்தது:',
        next: 'அடுத்து',
        savedCases: 'சேமிக்கப்பட்ட வழக்குகள்',
        language: 'மொழி',
        question: 'கேள்வி',
        saved: 'சேமிக்கப்பட்ட',
        delete: 'நீக்கு',
        rentNotice: 'வாடை நோட்டீஸ்'
      },
      te: {
        logo: '⚖️ LawHub MVP',
        tagline: 'భారతదేశానికి చట్ట సాక్షరత ప్లాట్‌ఫార్మ్',
        selectLanguage: 'మీ భాషను ఎంచుకోండి',
        youSelected: 'మీరు ఎంచుకున్నవి:',
        next: 'తర్వాత',
        savedCases: 'సేవ్ చేసిన కేసులు',
        language: 'భాష',
        question: 'ప్రశ్న',
        saved: 'సేవ్ చేయబడింది',
        delete: 'తొలగించు',
        rentNotice: 'అద్దె నోటిసు'
      },
      bn: {
        logo: '⚖️ LawHub MVP',
        tagline: 'ভারতের জন্য আইনি সাক্ষরতা প্ল্যাটফর্ম',
        selectLanguage: 'আপনার ভাষা নির্বাচন করুন',
        youSelected: 'আপনি নির্বাচন করেছেন:',
        next: 'পরবর্তী',
        savedCases: 'সংরক্ষিত মামলাগুলি',
        language: 'ভাষা',
        question: 'প্রশ্ন',
        saved: 'সংরক্ষিত',
        delete: 'মুছুন',
        rentNotice: 'ভাড়া নোটিশ'
      },
      gu: {
        logo: '⚖️ LawHub MVP',
        tagline: 'ભારત માટે કાયદાકીય સાક્ષરતા પ્લેટફોર્મ',
        selectLanguage: 'તમારી ભાષા પસંદ કરો',
        youSelected: 'તમે પસંદ કર્યું છે:',
        next: 'આગલું',
        savedCases: 'સાચવેલા કેસો',
        language: 'ભાષા',
        question: 'પ્રશ્ન',
        saved: 'સાચવેલું',
        delete: 'આપવું',
        rentNotice: 'ભાડું નોટિસ'
      }
    };

    function App() {
      const [language, setLanguage] = useState('en');
      const t = translations[language] || translations.en;
      const languageNames = {
        en: 'English',
        hi: 'Hindi',
        ta: 'Tamil',
        te: 'Telugu',
        bn: 'Bengali',
        gu: 'Gujarati',
        mr: 'Marathi',
        kn: 'Kannada',
        ml: 'Malayalam',
        or: 'Odia',
        pa: 'Punjabi',
        as: 'Assamese',
        br: 'Bodo',
        do: 'Dogri',
        ko: 'Konkani',
        ma: 'Maithili',
        mn: 'Manipuri',
        ne: 'Nepali',
        sa: 'Sanskrit',
        st: 'Santali',
        sd: 'Sindhi',
        ur: 'Urdu'
      };

      return (
        <div>
          <header>
            <div className="container">
              <div className="logo">{t.logo}</div>
              <div className="tagline">{t.tagline}</div>
            </div>
          </header>
          <main>
            <section>
              <div className="container">
                <h2>🌍 {t.selectLanguage}</h2>
                <div className="select-wrapper">
                  <select 
                    value={language} 
                    onChange={(e) => setLanguage(e.target.value)}
                  >
                    {Object.entries(languageNames).map(([code, name]) => (
                      <option key={code} value={code}>{name}</option>
                    ))}
                  </select>
                </div>
                <p>{t.youSelected} <strong>{languageNames[language]}</strong></p>
                <button className="btn">{t.next}</button>
              </div>
            </section>
            <section>
              <div className="container">
                <h2>📋 {t.savedCases}</h2>
                <div style={{border: '2px solid var(--secondary)', borderRadius: '8px', padding: '1.5rem', marginBottom: '2rem'}}>
                  <h3>{t.rentNotice}</h3>
                  <p><strong>{t.language}:</strong> {languageNames[language]}</p>
                  <p><strong>{t.question}:</strong> My landlord gave me a 30-day notice to vacate without proper reason. What are my rights?</p>
                  <p><strong>{t.saved}:</strong> 1/3/2026</p>
                  <button className="btn btn-secondary">{t.delete}</button>
                </div>
              </div>
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
